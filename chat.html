<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <style>
    :root {
      --bg-color: #fafafa;
      --box-bg: white;
      --text-color: #333;
      --border-color: #ddd;
      --system-msg: gray;
      --button-bg: #007bff;
    }

    body.dark-mode {
      --bg-color: #1a1a1a;
      --box-bg: #2d2d2d;
      --text-color: #e0e0e0;
      --border-color: #444;
      --system-msg: #999;
      --button-bg: #375a7f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg-color);
      color: var(--text-color);
      transition: background 0.3s, color 0.3s;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    #inputBar {
      display: flex;
      gap: 10px;
      padding: 15px;
      border-top: 1px solid var(--border-color);
      background: var(--box-bg);
    }

    #message {
      flex: 1;
      padding: 10px;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      border-radius: 4px;
      outline: none;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
      background: var(--button-bg);
      color: white;
      border: none;
      border-radius: 4px;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    #themeToggle {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 5px 10px;
      font-size: 12px;
      z-index: 10;
    }

    .msg {
      margin: 8px 0;
      word-break: break-word;
      line-height: 1.4;
    }

    .system {
      color: var(--system-msg);
      font-style: italic;
      font-size: 0.9em;
    }

    .timestamp {
      font-size: 0.8em;
      opacity: 0.6;
      margin-right: 5px;
    }

    b { color: var(--button-bg); }
  </style>
</head>

<body>

<button id="themeToggle" onclick="toggleTheme()">🌙 Dark Mode</button>

<div id="chat"></div>

<div id="inputBar">
  <input id="message" placeholder="Type a message..." autocomplete="off">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const username = localStorage.getItem("chat_username");

if (!username) {
  window.location.href = "index.html";
}

let socket;
const chat = document.getElementById("chat");
const messageInput = document.getElementById("message");
const themeToggle = document.getElementById("themeToggle");

if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark-mode");
  themeToggle.textContent = "☀️ Light Mode";
}

function toggleTheme() {
  const isDark = document.body.classList.toggle("dark-mode");
  if (isDark) {
    localStorage.setItem("theme", "dark");
    themeToggle.textContent = "☀️ Light Mode";
  } else {
    localStorage.setItem("theme", "light");
    themeToggle.textContent = "🌙 Dark Mode";
  }
}

function addMessage(data) {
  const div = document.createElement("div");
  const timeStr = new Date(data.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  if (data.type === "system") {
    div.className = "msg system";
    div.textContent = data.message;
  } else {
    div.className = "msg";
    div.innerHTML = `<span class="timestamp">[${timeStr}]</span> <b>${data.username}</b>: ${data.message}`;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function connect() {
  const WS_URL = `wss://purple-base-c918.aratox-business.workers.dev/ws?username=${encodeURIComponent(username)}`;
  socket = new WebSocket(WS_URL);

  socket.onopen = () => {
    console.log("Connected to server");
  };

  socket.onmessage = (event) => {
    addMessage(JSON.parse(event.data));
  };

  socket.onclose = () => {
    console.log("Connection lost. Attempting silent reconnect...");
    setTimeout(connect, 2000);
  };

  socket.onerror = () => {
    socket.close();
  };
}

connect();

window.addEventListener("beforeunload", () => {
  if (socket && socket.readyState === WebSocket.OPEN) {
    socket.send(JSON.stringify({ type: "explicit_leave" }));
  }
});

setInterval(() => {
  if (socket && socket.readyState === WebSocket.OPEN) {
    socket.send(JSON.stringify({ type: "ping" }));
  }
}, 20000);

function sendMessage() {
  const message = messageInput.value.trim();
  if (!message) return;

  if (socket && socket.readyState === WebSocket.OPEN) {
    socket.send(JSON.stringify({
      username,
      message
    }));
    messageInput.value = "";
  }
}

messageInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  }
});
</script>

</body>
</html>
