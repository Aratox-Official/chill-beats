<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: auto; }
    #chat { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; }
    input, button { padding: 8px; margin-top: 5px; }
  </style>
</head>
<body>

<h2>Chat</h2>

<div id="chat"></div>

<input id="message" placeholder="Message">
<button onclick="sendMessage()">Send</button>

<script>
const username = localStorage.getItem("chat_username");

if (!username) {
  window.location.href = "index.html";
}

const WS_URL = "wss://purple-base-c918.aratox-business.workers.dev/ws";
let socket = new WebSocket(WS_URL);

socket.onmessage = (event) => {
  const msg = JSON.parse(event.data);

  const div = document.createElement("div");
  div.textContent = `[${new Date(msg.time).toLocaleTimeString()}] ${msg.username}: ${msg.message}`;

  const chat = document.getElementById("chat");
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
};

function sendMessage() {
  const message = document.getElementById("message").value;

  if (!message) return;

  socket.send(JSON.stringify({ username, message }));
  document.getElementById("message").value = "";
}
</script>

</body>
</html>
