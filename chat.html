<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fafafa;
      color: #000;
    }

    body.dark-mode {
      background: #1a1a1a;
      color: #f0f0f0;
    }

    body.dark-mode #inputBar {
      background: #2d2d2d;
      border-top: 1px solid #444;
    }

    body.dark-mode input,
    body.dark-mode button {
      background: #3d3d3d;
      color: #f0f0f0;
      border: 1px solid #555;
    }

    body.dark-mode .history-separator {
      color: #555;
    }

    body.dark-mode .history-separator::before,
    body.dark-mode .history-separator::after {
      border-top-color: #444;
    }

    body.dark-mode .history-msg {
      color: #aaa;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    #inputBar {
      display: flex;
      gap: 10px;
      padding: 10px;
      border-top: 1px solid #ddd;
      background: white;
    }

    #message {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
    }

    .msg {
      margin: 6px 0;
      word-break: break-word;
    }

    .history-msg {
      color: #888;
    }

    .history-separator {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
      color: #bbb;
      font-size: 0.8em;
      font-style: italic;
    }

    .history-separator::before,
    .history-separator::after {
      content: "";
      flex: 1;
      border-top: 1px solid #ddd;
    }

    .system {
      color: gray;
      font-style: italic;
    }

    #themeToggle {
      position: absolute;
      top: 10px;
      right: 10px;
    }
  </style>
</head>
<body>

<button id="themeToggle" onclick="toggleTheme()">Dark Mode</button>

<div id="chat"></div>

<div id="inputBar">
  <input id="message" placeholder="Message..." autocomplete="off">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const username = localStorage.getItem("chat_username");
const themeToggle = document.getElementById("themeToggle");

if (!username) {
  window.location.href = "index.html";
}

let socket;
let historyRendered = false;
const chat = document.getElementById("chat");
const messageInput = document.getElementById("message");

if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark-mode");
  themeToggle.innerText = "Light Mode";
}

function toggleTheme() {
  const isDark = document.body.classList.toggle("dark-mode");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  themeToggle.innerText = isDark ? "Light Mode" : "Dark Mode";
}

function formatTime(ts) {
  return new Date(ts).toLocaleTimeString();
}

function renderMessage(data, isHistory = false) {
  const div = document.createElement("div");

  if (data.type === "system") {
    div.className = "msg system";
    div.textContent = data.message;
  } else {
    div.className = isHistory ? "msg history-msg" : "msg";
    div.textContent = `[${formatTime(data.time)}] ${data.username}: ${data.message}`;
  }

  chat.appendChild(div);
}

function renderHistory(messages) {
  for (const msg of messages) {
    renderMessage(msg, true);
  }

  const sep = document.createElement("div");
  sep.className = "history-separator";
  sep.textContent = "earlier messages above · live below";
  chat.appendChild(sep);

  chat.scrollTop = chat.scrollHeight;
  historyRendered = true;
}

function addMessage(data) {
  renderMessage(data, false);
  chat.scrollTop = chat.scrollHeight;
}

function connect() {
  const WS_URL = `wss://purple-base-c918.aratox-business.workers.dev/ws?username=${encodeURIComponent(username)}`;
  socket = new WebSocket(WS_URL);

  socket.onopen = () => {
    console.log("Connected");
  };

  socket.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === "history") {
      if (!historyRendered) {
        renderHistory(data.messages);
      }
      return;
    }

    addMessage(data);
  };

  socket.onclose = () => {
    console.log("Disconnected... reconnecting...");
    setTimeout(connect, 2000);
  };

  socket.onerror = () => {
    socket.close();
  };
}

connect();

window.addEventListener("beforeunload", () => {
  if (socket && socket.readyState === WebSocket.OPEN) {
    socket.send(JSON.stringify({ type: "explicit_leave" }));
  }
});

setInterval(() => {
  if (socket && socket.readyState === WebSocket.OPEN) {
    socket.send(JSON.stringify({ type: "ping" }));
  }
}, 20000);

function sendMessage() {
  const message = messageInput.value.trim();
  if (!message) return;

  socket.send(JSON.stringify({ username, message }));
  messageInput.value = "";
}

messageInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  }
});
</script>

</body>
</html>
