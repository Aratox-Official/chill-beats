<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fafafa;
      color: #000;
    }

    body.dark-mode {
      background: #1a1a1a;
      color: #f0f0f0;
    }

    body.dark-mode #inputBar {
      background: #2d2d2d;
      border-top: 1px solid #444;
    }

    body.dark-mode input, 
    body.dark-mode button {
      background: #3d3d3d;
      color: #f0f0f0;
      border: 1px solid #555;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    #inputBar {
      display: flex;
      gap: 10px;
      padding: 10px;
      border-top: 1px solid #ddd;
      background: white;
    }

    #message {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
    }

    .msg {
      margin: 6px 0;
      word-break: break-word;
    }

    .system {
      color: gray;
      font-style: italic;
    }

    #themeToggle {
      position: absolute;
      top: 10px;
      right: 10px;
    }
  </style>
</head>
<body>

<button id="themeToggle" onclick="toggleTheme()">Dark Mode</button>

<div id="chat"></div>

<div id="inputBar">
  <input id="message" placeholder="Message..." autocomplete="off">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const username = localStorage.getItem("chat_username");
const themeToggle = document.getElementById("themeToggle");

if (!username) {
  window.location.href = "index.html";
}

let socket;
const chat = document.getElementById("chat");
const messageInput = document.getElementById("message");

if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark-mode");
  themeToggle.innerText = "Light Mode";
}

function toggleTheme() {
  const isDark = document.body.classList.toggle("dark-mode");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  
  themeToggle.innerText = isDark ? "Light Mode" : "Dark Mode";
}

function addMessage(data) {
  const div = document.createElement("div");

  if (data.type === "system") {
    div.className = "msg system";
    div.textContent = data.message;
  } else {
    div.className = "msg";
    div.textContent =
      `[${new Date(data.time).toLocaleTimeString()}] ${data.username}: ${data.message}`;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function connect() {
  const WS_URL = `wss://purple-base-c918.aratox-business.workers.dev/ws?username=${encodeURIComponent(username)}`;
  socket = new WebSocket(WS_URL);

  socket.onopen = () => {
    console.log("Connected");
  };

  socket.onmessage = (event) => {
    addMessage(JSON.parse(event.data));
  };

  socket.onclose = () => {
    console.log("Disconnected... reconnecting...");
    setTimeout(connect, 2000);
  };

  socket.onerror = () => {
    socket.close();
  };
}

connect();

window.addEventListener("beforeunload", () => {
  if (socket && socket.readyState === WebSocket.OPEN) {
    socket.send(JSON.stringify({ type: "explicit_leave" }));
  }
});

setInterval(() => {
  if (socket && socket.readyState === WebSocket.OPEN) {
    socket.send(JSON.stringify({ type: "ping" }));
  }
}, 20000);

function sendMessage() {
  const message = messageInput.value.trim();
  if (!message) return;

  socket.send(JSON.stringify({
    username,
    message
  }));

  messageInput.value = "";
}

messageInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  }
});
</script>

</body>
</html>
