<!DOCTYPE html>
<html>
<head>
  <title>Join Chat</title>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f2f2f2;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Enter Chat</h2>

  <input id="username" placeholder="Username">

  <div class="cf-turnstile"
       data-sitekey="0x4AAAAAAC8_0cGJkZVDYH61"
       data-callback="verified">
  </div>

  <button id="joinBtn" disabled onclick="join()">Join Chat</button>
</div>

<script>
let isVerified = false;

function verified() {
  isVerified = true;
  document.getElementById("joinBtn").disabled = false;
}

function join() {
  const username = document.getElementById("username").value.trim();

  if (!username || !isVerified) return;

  localStorage.setItem("chat_username", username);
  window.location.href = "chat.html";
}
</script>

</body>
</html>
